name: cares_app
description: >
  C.A.R.E.S. — Conde Labac Residents System.
  The official mobile service platform of Barangay Conde Labac, Batangas City.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

# path_provider_foundation ≥2.5 pulls in the `objective_c` native-assets
# package, whose Windows build breaks on paths with spaces (C:\Users\Nitro V 15).
# It's an iOS/macOS-only plugin, so pinning the older version is safe here.
dependency_overrides:
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/gis/

# Launcher icons — regenerate with:  dart run flutter_launcher_icons
# Source images live in assets/icon/ (composed from the barangay seal:
# app_icon.png = seal on navy, app_icon_foreground.png = padded transparent
# seal for Android's adaptive-icon safe zone).
flutter_launcher_icons:
  # Seal on a navy gradient backdrop (matching the system's navy palette).
  # bg_gradient.png is the navyDeep→navy→navyLight diagonal used as the
  # adaptive-icon background; app_icon_foreground_big.png is a larger,
  # less-padded transparent seal; app_icon_full.png is the composited icon
  # (seal on the gradient) for the non-adaptive/legacy targets.
  image_path: "assets/icon/app_icon_full.png"
  android: true
  adaptive_icon_background: "assets/icon/bg_gradient.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground_big.png"
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
  web:
    generate: true

# ─────────────────────────────────────────────────────────────
# NOTE: Place the following images inside assets/images/
#   barangay_hall.jpg   → photo of the Barangay Hall (from web hero)
#   barangay_seal.png   → official seal of Barangay Conde Labac
# The UI degrades gracefully (branded placeholders) if missing.
# ─────────────────────────────────────────────────────────────
